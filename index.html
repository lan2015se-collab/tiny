<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>氣泡紙 ∞</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a1628;--bar-bg:rgba(10,22,40,0.95);--accent:#5eb8ff;
  --btn-bg:rgba(255,255,255,0.08);--btn-border:rgba(255,255,255,0.14);
  --modal-bg:#0f1d30;--modal-border:rgba(255,255,255,0.1);
  --text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.42);
}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;}

/* TOP BAR */
#top-bar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bar-bg);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;gap:6px;padding:0 10px;z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.07);}
#score-area{flex:1;min-width:0;overflow:hidden;}
#score-main{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;}
#score-main b{color:var(--accent);font-size:17px;font-weight:700;}
#streak-badge{display:inline-block;background:rgba(255,200,50,0.18);border:1px solid rgba(255,200,50,0.4);
  color:#ffc832;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:5px;
  opacity:0;transition:opacity 0.2s;vertical-align:middle;}
#streak-badge.show{opacity:1;}

.tbtn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text);
  padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer;white-space:nowrap;
  transition:background 0.12s,transform 0.08s;flex-shrink:0;}
.tbtn:hover{background:rgba(255,255,255,0.14);}
.tbtn:active{transform:scale(0.92);}
.tbtn.accent{background:rgba(94,184,255,0.15);border-color:rgba(94,184,255,0.35);color:var(--accent);}
.tbtn.danger{background:rgba(255,100,100,0.15);border-color:rgba(255,100,100,0.35);color:#ff6464;}
.tbtn.gold{background:rgba(255,200,50,0.15);border-color:rgba(255,200,50,0.35);color:#ffc832;}

/* GRID */
#grid-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;touch-action:none;}
#grid-canvas{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:grid;
  /* cols/rows set by JS */
}

/* BUBBLE */
.bbl{
  border-radius:50%;cursor:pointer;position:relative;
  /* transition only for hover, NOT for popped/refill to avoid flicker */
  transition:transform 0.07s ease;
  /* clicking behaviour */
  pointer-events:auto;
}
/* highlight */
.bbl::before{content:'';position:absolute;top:11%;left:17%;width:30%;height:22%;
  background:rgba(255,255,255,0.52);border-radius:50%;filter:blur(1px);transform:rotate(-30deg);}
.bbl:hover{transform:scale(1.08);}

/* THEMES — background applied to bubble directly via data-attr in JS */
/* popped state */
.bbl.popped{
  background:rgba(255,255,255,0.04)!important;
  box-shadow:inset 0 0 3px rgba(0,0,0,0.35)!important;
  cursor:default;pointer-events:none;   /* ← key fix: no events after pop */
  animation:none!important;
}
.bbl.popped::before{display:none;}

/* animations */
@keyframes bbl-pop{
  0%{transform:scale(1);opacity:1;}
  30%{transform:scale(1.28);opacity:0.85;}
  100%{transform:scale(0.55);opacity:0;}
}
@keyframes bbl-refill{
  0%{transform:scale(0.15);opacity:0;}
  60%{transform:scale(1.1);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}
@keyframes golden-glow{
  0%,100%{box-shadow:0 0 7px rgba(255,215,0,0.5),inset 2px 2px 5px rgba(255,245,150,0.35);}
  50%{box-shadow:0 0 18px rgba(255,215,0,0.9),inset 2px 2px 5px rgba(255,245,150,0.35);}
}
@keyframes bomb-throb{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.07);}
}
@keyframes frozen-shimmer{
  0%,100%{filter:brightness(1.05) saturate(0.7);}
  50%{filter:brightness(1.25) saturate(0.9);}
}
@keyframes shockwave{0%{transform:scale(0.4);opacity:0.85;}100%{transform:scale(5);opacity:0;}}
@keyframes floatup{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-55px);opacity:0;}}
@keyframes combo-in{0%{transform:translateX(-50%) scale(0.5);opacity:0;}60%{transform:translateX(-50%) scale(1.15);}100%{transform:translateX(-50%) scale(1);opacity:1;}}

.bbl.golden-type{animation:golden-glow 1.3s ease-in-out infinite;}
.bbl.bomb-type{animation:bomb-throb 0.85s ease-in-out infinite;}
.bbl.frozen-type{animation:frozen-shimmer 2s ease-in-out infinite;}
/* frozen-locked: cannot be popped (visual cue only, JS also guards) */
.bbl.frozen-locked::after{
  content:'❄';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.55em;pointer-events:none;opacity:0.7;
}

/* shockwave */
.shockwave{position:absolute;border-radius:50%;border:3px solid rgba(255,80,30,0.75);
  pointer-events:none;animation:shockwave 0.45s ease-out forwards;z-index:20;}

/* float score */
.float-num{position:absolute;font-weight:900;pointer-events:none;z-index:25;
  animation:floatup 0.7s ease-out forwards;text-shadow:0 1px 4px rgba(0,0,0,0.6);}

/* COMBO FLASH */
#combo-flash{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  font-size:26px;font-weight:900;color:#ffc832;pointer-events:none;z-index:90;
  opacity:0;transition:opacity 0.12s;text-shadow:0 0 18px rgba(255,200,50,0.65);}
#combo-flash.show{opacity:1;animation:combo-in 0.22s ease-out;}

/* TIMER BAR */
#timer-bar-wrap{position:fixed;top:52px;left:0;right:0;height:3px;
  background:rgba(255,255,255,0.06);z-index:98;display:none;}
#timer-bar-fill{height:100%;background:linear-gradient(90deg,#ff6464,#ffc832);
  width:100%;transition:width 0.12s linear;}

/* PROGRESS RING */
#progress-ring-wrap{position:fixed;bottom:16px;right:16px;width:54px;height:54px;z-index:50;}
#progress-ring-wrap svg{transform:rotate(-90deg);}
#pr-bg{stroke:rgba(255,255,255,0.09);}
#pr-fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 0.2s ease;}
#pr-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--accent);}

/* SPEED */
#speed-meter{position:fixed;bottom:16px;left:16px;font-size:10px;color:var(--muted);z-index:50;line-height:1.7;}
#speed-val{color:var(--accent);font-weight:700;font-size:15px;display:block;}

/* DRAG TRAIL */
.drag-trail{position:absolute;border-radius:50%;background:rgba(255,255,255,0.22);
  pointer-events:none;z-index:8;animation:trail-fade 0.28s ease-out forwards;}
@keyframes trail-fade{to{opacity:0;transform:scale(0.2);}}

/* MODE BANNER */
#mode-banner{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.4);color:#ff8a8a;
  padding:5px 14px;border-radius:12px;font-size:12px;font-weight:600;z-index:97;
  display:none;white-space:nowrap;pointer-events:none;}

/* OVERLAYS / MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--modal-bg);border:1px solid var(--modal-border);border-radius:22px;
  width:min(410px,95vw);max-height:85dvh;display:flex;flex-direction:column;overflow:hidden;}
.mhead{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:space-between;}
.mhead h2{font-size:16px;color:#fff;font-weight:600;}
.mclose{background:rgba(255,255,255,0.07);border:none;color:var(--muted);width:27px;height:27px;
  border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:background 0.12s;}
.mclose:hover{background:rgba(255,255,255,0.18);color:#fff;}

/* SETTINGS */
#set-body{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;background:rgba(255,255,255,0.04);border-radius:11px;}
.set-label{font-size:13px;color:var(--text);}
.set-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.tog{position:relative;width:38px;height:22px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;background:rgba(255,255,255,0.14);border-radius:11px;
  cursor:pointer;transition:background 0.18s;}
.tog-sl::before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;
  background:#fff;border-radius:50%;transition:transform 0.18s;}
.tog input:checked+.tog-sl{background:#5eb8ff;}
.tog input:checked+.tog-sl::before{transform:translateX(16px);}
.seg{display:flex;background:rgba(255,255,255,0.07);border-radius:9px;overflow:hidden;}
.seg-b{flex:1;border:none;background:transparent;color:var(--muted);padding:5px 0;
  font-size:11px;cursor:pointer;transition:background 0.1s,color 0.1s;}
.seg-b.on{background:rgba(94,184,255,0.22);color:var(--accent);}

/* LEADERBOARD */
#lb-body{padding:12px;display:flex;flex-direction:column;gap:9px;}
#lb-save-row{display:flex;gap:7px;}
#lb-name-in{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  border-radius:9px;color:#fff;padding:7px 10px;font-size:13px;outline:none;
  transition:border-color 0.14s;}
#lb-name-in::placeholder{color:var(--muted);}
#lb-name-in:focus{border-color:var(--accent);}
#lb-save-btn{background:var(--accent);border:none;color:#000;padding:7px 14px;
  border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:opacity 0.12s,transform 0.08s;}
#lb-save-btn:hover{opacity:0.86;}
#lb-save-btn:active{transform:scale(0.95);}
#lb-stats{font-size:11px;color:var(--muted);}
#lb-stats span{color:var(--accent);font-weight:600;}
#lb-list-wrap{overflow-y:auto;flex:1;}
.lb-empty{text-align:center;color:var(--muted);font-size:13px;padding:26px 0;}
.lb-row{display:flex;align-items:center;gap:8px;padding:8px 5px;border-radius:9px;}
.lb-row:hover{background:rgba(255,255,255,0.04);}
.lb-rank{font-size:12px;font-weight:700;min-width:20px;text-align:center;}
.r-g{color:#ffd700;}.r-s{color:#c0c0c0;}.r-b{color:#cd7f32;}.r-o{color:rgba(255,255,255,0.28);}
.lb-name{flex:1;font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-size:13px;font-weight:700;color:var(--accent);}
.lb-extra{font-size:10px;color:var(--muted);text-align:right;}

/* ACHIEVEMENT */
#ach-wrap{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(20,30,50,0.95);border:1px solid rgba(255,200,50,0.4);
  border-radius:14px;padding:9px 16px;display:flex;align-items:center;gap:10px;
  z-index:160;opacity:0;transition:opacity 0.22s,transform 0.22s;
  transform:translateX(-50%) translateY(-8px);pointer-events:none;white-space:nowrap;}
#ach-wrap.show{opacity:1;transform:translateX(-50%) translateY(0);}
#ach-icon{font-size:20px;}
#ach-text{font-size:12px;color:#ffc832;font-weight:600;}

/* COUNTDOWN */
#cdov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:400;background:rgba(0,0,0,0.55);
  opacity:0;pointer-events:none;transition:opacity 0.25s;}
#cdov.show{opacity:1;pointer-events:auto;}
#cd-num{font-size:110px;font-weight:900;color:#fff;line-height:1;
  text-shadow:0 0 40px rgba(94,184,255,0.6);}

/* TOAST */
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);
  background:rgba(30,50,30,0.92);border:1px solid rgba(60,200,80,0.4);color:#5de87a;
  padding:6px 15px;border-radius:12px;font-size:12px;opacity:0;transition:opacity 0.22s;
  pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="top-bar">
  <div id="score-area">
    <div id="score-main">戳了 <b id="snum">0</b> 顆
      <span id="streak-badge">🔥×<span id="sval">0</span></span>
    </div>
  </div>
  <button class="tbtn accent" id="btn-auto">▶ 自動</button>
  <button class="tbtn" id="btn-theme">🎨</button>
  <button class="tbtn" id="btn-mode">⏱ 挑戰</button>
  <button class="tbtn" id="btn-set">⚙️</button>
  <button class="tbtn gold" id="btn-lb">🏆</button>
</div>

<div id="timer-bar-wrap"><div id="timer-bar-fill"></div></div>
<div id="mode-banner"></div>

<div id="grid-wrap">
  <div id="grid-canvas"></div>
</div>

<div id="combo-flash"></div>
<div id="ach-wrap"><span id="ach-icon">🏅</span><span id="ach-text"></span></div>
<div id="toast"></div>

<div id="progress-ring-wrap">
  <svg width="54" height="54" viewBox="0 0 54 54">
    <circle id="pr-bg" cx="27" cy="27" r="21" fill="none" stroke-width="4"/>
    <circle id="pr-fill" cx="27" cy="27" r="21" fill="none" stroke-width="4"
      stroke-dasharray="131.9" stroke-dashoffset="131.9"/>
  </svg>
  <div id="pr-label">0%</div>
</div>

<div id="speed-meter"><span id="speed-val">0</span>顆/秒</div>

<div id="cdov"><div id="cd-num">3</div></div>

<!-- Settings -->
<div class="overlay" id="set-ov">
  <div class="modal">
    <div class="mhead"><h2>⚙️ 設定</h2><button class="mclose" id="set-close">✕</button></div>
    <div id="set-body">
      <div class="set-row">
        <div><div class="set-label">🔊 音效</div><div class="set-sub">點擊時播放啵聲</div></div>
        <label class="tog"><input type="checkbox" id="s-sound" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">📳 震動</div><div class="set-sub">手機點擊輕震</div></div>
        <label class="tog"><input type="checkbox" id="s-vib" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">💣 炸彈氣泡</div><div class="set-sub">連鎖爆破周圍氣泡</div></div>
        <label class="tog"><input type="checkbox" id="s-bomb" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">⭐ 黃金氣泡</div><div class="set-sub">+5 分加成</div></div>
        <label class="tog"><input type="checkbox" id="s-golden" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">🧊 冰凍氣泡</div><div class="set-sub">點到後周圍凍結 3 秒</div></div>
        <label class="tog"><input type="checkbox" id="s-frozen" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">✋ 拖曳連戳</div><div class="set-sub">按住拖曳連續爆破</div></div>
        <label class="tog"><input type="checkbox" id="s-drag" checked><span class="tog-sl"></span></label>
      </div>
      <div class="set-row">
        <div><div class="set-label">氣泡大小</div></div>
        <div class="seg" id="seg-size">
          <button class="seg-b" data-v="sm">小</button>
          <button class="seg-b on" data-v="md">中</button>
          <button class="seg-b" data-v="lg">大</button>
        </div>
      </div>
      <div class="set-row">
        <div><div class="set-label">自動速度</div></div>
        <div class="seg" id="seg-spd">
          <button class="seg-b" data-v="slow">慢</button>
          <button class="seg-b on" data-v="normal">正常</button>
          <button class="seg-b" data-v="fast">快</button>
          <button class="seg-b" data-v="ludicrous">爆速</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Leaderboard -->
<div class="overlay" id="lb-ov">
  <div class="modal" style="max-height:80dvh;">
    <div class="mhead"><h2>🏆 排行榜</h2><button class="mclose" id="lb-close">✕</button></div>
    <div id="lb-body">
      <div id="lb-stats">本局 <span id="lb-cur">0</span> 顆 ／ 最高連擊 <span id="lb-cmb">0</span> ／ 最快 <span id="lb-spd">—</span>/s</div>
      <div id="lb-save-row">
        <input id="lb-name-in" type="text" placeholder="輸入名字儲存成績" maxlength="20">
        <button id="lb-save-btn">儲存</button>
      </div>
      <div id="lb-list-wrap"><div id="lb-list"></div></div>
    </div>
  </div>
</div>

<script>
// ══ CONSTANTS ══
const LSKEY='bw3_lb', ACHKEY='bw3_ach';
const SIZES={sm:26,md:38,lg:54};
const SPEEDS={slow:55,normal:20,fast:7,ludicrous:1};
const THEMES=['blue','pink','green','gold','purple','rainbow'];
const THEME_NAMES=['藍色','粉色','綠色','金色','紫色','彩虹'];
// per-theme bubble CSS
const THEME_CSS={
  blue:'radial-gradient(circle at 35% 30%,#b0dcff,#3a9bdc 45%,#1a5f8e 80%,#0d3a5c)',
  pink:'radial-gradient(circle at 35% 30%,#ffcce8,#e8559a 45%,#a82870 80%,#6b1245)',
  green:'radial-gradient(circle at 35% 30%,#b8ffcc,#3adc7a 45%,#1a8e50 80%,#0d5c34)',
  gold:'radial-gradient(circle at 35% 30%,#fff4a8,#ffc832 45%,#c07a00 80%,#7a4c00)',
  purple:'radial-gradient(circle at 35% 30%,#ddc8ff,#9b55e8 45%,#5a1a8e 80%,#350d5c)',
};
const RAINBOW=[
  'radial-gradient(circle at 35% 30%,#ffaaaa,#ff3333 45%,#990000)',
  'radial-gradient(circle at 35% 30%,#ffddaa,#ff8800 45%,#994400)',
  'radial-gradient(circle at 35% 30%,#ffffaa,#cccc00 45%,#777700)',
  'radial-gradient(circle at 35% 30%,#aaffaa,#33bb33 45%,#006600)',
  'radial-gradient(circle at 35% 30%,#aaddff,#3399ff 45%,#0055aa)',
  'radial-gradient(circle at 35% 30%,#ddaaff,#9933ff 45%,#550099)',
];
const SHADOW_NORMAL='inset -2px -2px 4px rgba(0,0,0,0.28),inset 2px 2px 5px rgba(255,255,255,0.28),0 1px 3px rgba(0,0,0,0.45)';
const SHADOW_GOLDEN='0 0 0 rgba(0,0,0,0),inset 2px 2px 5px rgba(255,245,150,0.4)';
const SHADOW_BOMB='inset 2px 2px 5px rgba(255,150,150,0.3),0 0 8px rgba(255,50,50,0.5)';
const SHADOW_FROZEN='inset 2px 2px 5px rgba(200,240,255,0.3)';

const ACHS=[
  {id:'first',icon:'🐣',lbl:'第一泡！',cond:()=>state.popped>=1},
  {id:'ten',icon:'🔟',lbl:'戳了十顆',cond:()=>state.popped>=10},
  {id:'s5',icon:'🔥',lbl:'連擊 ×5',cond:()=>state.maxStreak>=5},
  {id:'s10',icon:'💥',lbl:'連擊 ×10',cond:()=>state.maxStreak>=10},
  {id:'s20',icon:'🌋',lbl:'連擊 ×20',cond:()=>state.maxStreak>=20},
  {id:'full',icon:'🏁',lbl:'全清！',cond:()=>false},
  {id:'fast',icon:'⚡',lbl:'10顆/秒',cond:()=>state.pps>=10},
  {id:'r3',icon:'♻️',lbl:'玩了三輪',cond:()=>state.rounds>=3},
  {id:'bomb',icon:'💣',lbl:'觸發炸彈',cond:()=>false},
  {id:'golden',icon:'⭐',lbl:'黃金氣泡',cond:()=>false},
  {id:'freeze',icon:'🧊',lbl:'冰凍氣泡',cond:()=>false},
];

// ══ STATE ══
const cfg={sound:true,vib:true,bomb:true,golden:true,frozen:true,drag:true,size:'md',speed:'normal'};
let themeIdx=0;

const state={
  bubbles:[],      // DOM refs
  type:[],         // 'normal'|'bomb'|'golden'|'frozen' per index
  alive:[],        // true = not yet popped
  frozen:new Set(),// indices currently frozen
  total:0,
  popped:0,        // real bubble count (not pts)
  pts:0,           // score with bonus
  streak:0,
  maxStreak:0,
  pps:0,
  maxPPS:0,
  rounds:0,
  lastPop:0,
  popTimes:[],
};

let autoRunning=false,autoTimer=null,restoreTimer=null;
let challengeOn=false,challengeTimer=null,challengeStartPopped=0;
const CHALLENGE_SEC=30;
let audioCtx=null;
let isDragging=false;
let streakResetTimer=null,comboTimer=null;

// ══ AUDIO ══
function aCtx(){return audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)());}
function playPop(pitch=1,vol=0.38){
  if(!cfg.sound)return;
  try{
    const c=aCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';
    o.frequency.setValueAtTime(280*pitch,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(65,c.currentTime+0.09);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.13);
    o.start();o.stop(c.currentTime+0.14);
  }catch(_){}
}
function playChime(){
  if(!cfg.sound)return;
  try{
    const c=aCtx();
    [523,659,784,1047].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.value=f;
      const t=c.currentTime+i*0.11;
      g.gain.setValueAtTime(0.28,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      o.start(t);o.stop(t+0.46);
    });
  }catch(_){}
}
function vib(p=40){if(cfg.vib&&navigator.vibrate)navigator.vibrate(p);}

// ══ GRID ══
function calcGrid(){
  const W=window.innerWidth, H=window.innerHeight-52;
  const sz=SIZES[cfg.size];
  const gap=3,pad=4;
  const cols=Math.floor((W-pad*2+gap)/(sz+gap));
  const rows=Math.floor((H-pad*2+gap)/(sz+gap));
  return{cols,rows,sz,gap,pad};
}

function bubbleBG(idx,type){
  const theme=THEMES[themeIdx];
  if(type==='golden') return{bg:'radial-gradient(circle at 35% 30%,#fffacc,#ffd700 45%,#b8860b 80%,#7a5800)',sh:SHADOW_GOLDEN};
  if(type==='bomb')   return{bg:'radial-gradient(circle at 35% 30%,#ff9999,#ff2222 45%,#990000 80%,#550000)',sh:SHADOW_BOMB};
  if(type==='frozen') return{bg:'radial-gradient(circle at 35% 30%,#eeffff,#88ddff 45%,#4499cc 80%,#225577)',sh:SHADOW_FROZEN};
  if(theme==='rainbow') return{bg:RAINBOW[idx%RAINBOW.length],sh:SHADOW_NORMAL};
  return{bg:THEME_CSS[theme],sh:SHADOW_NORMAL};
}

function buildGrid(){
  const canvas=document.getElementById('grid-canvas');
  canvas.innerHTML='';
  state.bubbles=[];state.type=[];state.alive=[];state.frozen.clear();
  state.popped=0;state.pts=0;state.streak=0;state.maxStreak=0;
  state.pps=0;state.maxPPS=0;state.popTimes=[];state.lastPop=0;

  const{cols,rows,sz,gap,pad}=calcGrid();
  const total=cols*rows;
  state.total=total;

  // size the grid precisely — no centering (avoids fractional bubbles at edges)
  const gridW=cols*(sz+gap)-gap+pad*2;
  const gridH=rows*(sz+gap)-gap+pad*2;
  canvas.style.cssText=`
    display:grid;
    grid-template-columns:repeat(${cols},${sz}px);
    grid-template-rows:repeat(${rows},${sz}px);
    gap:${gap}px;
    padding:${pad}px;
    width:${gridW}px;
    height:${gridH}px;
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
  `;

  // pick special positions (mutually exclusive)
  const taken=new Set();
  function pickSlots(n){
    const s=new Set();
    let tries=0;
    while(s.size<n&&tries<total*3){
      const r=Math.floor(Math.random()*total);
      if(!taken.has(r)){s.add(r);taken.add(r);}
      tries++;
    }
    return s;
  }
  const bombN=cfg.bomb?Math.max(1,Math.round(total*0.025)):0;
  const goldenN=cfg.golden?Math.max(1,Math.round(total*0.015)):0;
  const frozenN=cfg.frozen?Math.max(1,Math.round(total*0.018)):0;
  const bombSlots=pickSlots(bombN);
  const goldenSlots=pickSlots(goldenN);
  const frozenSlots=pickSlots(frozenN);

  for(let i=0;i<total;i++){
    let type='normal';
    if(bombSlots.has(i)) type='bomb';
    else if(goldenSlots.has(i)) type='golden';
    else if(frozenSlots.has(i)) type='frozen';
    state.type.push(type);
    state.alive.push(true);

    const b=document.createElement('div');
    b.className='bbl';
    if(type!=='normal') b.classList.add(type+'-type');
    b.dataset.i=i;
    const{bg,sh}=bubbleBG(i,type);
    b.style.background=bg;
    b.style.boxShadow=sh;
    b.style.width=sz+'px';
    b.style.height=sz+'px';

    b.addEventListener('pointerdown',onDown,{passive:false});
    canvas.appendChild(b);
    state.bubbles.push(b);
  }

  updateHUD();
}

// ══ INPUT ══
const canvasEl=document.getElementById('grid-canvas');
// Use grid-wrap for move/up so we capture even if pointer leaves canvas
const wrapEl=document.getElementById('grid-wrap');
wrapEl.addEventListener('pointermove',onMove,{passive:false});
wrapEl.addEventListener('pointerup',()=>isDragging=false);
wrapEl.addEventListener('pointercancel',()=>isDragging=false);
wrapEl.addEventListener('pointerleave',()=>isDragging=false);

function onDown(e){
  e.preventDefault();
  e.stopPropagation();
  isDragging=true;
  const idx=+e.currentTarget.dataset.i;
  popAt(idx,true);
}
function onMove(e){
  if(!isDragging||!cfg.drag)return;
  e.preventDefault();
  // find bubble under pointer
  const el=document.elementFromPoint(e.clientX,e.clientY);
  if(el&&el.classList.contains('bbl')&&el.dataset.i!==undefined){
    const idx=+el.dataset.i;
    popAt(idx,true);
  }
  // particle trail
  const rect=canvasEl.getBoundingClientRect();
  const t=document.createElement('div');
  t.className='drag-trail';
  const ts=8;
  t.style.cssText=`left:${e.clientX-rect.left-ts/2}px;top:${e.clientY-rect.top-ts/2}px;width:${ts}px;height:${ts}px;`;
  canvasEl.appendChild(t);
  setTimeout(()=>t.remove(),300);
}

// ══ POP LOGIC ══
function popAt(idx,isUser){
  // Guard: must be alive (not popped) and not frozen
  if(!state.alive[idx]) return;
  if(state.frozen.has(idx)) return;

  const b=state.bubbles[idx];
  const type=state.type[idx];

  // Mark dead immediately — prevents any re-entry
  state.alive[idx]=false;

  // Animate
  b.style.animation='bbl-pop 0.17s ease-out forwards';
  b.style.pointerEvents='none'; // belt-and-suspenders

  setTimeout(()=>{
    b.classList.add('popped');
    b.style.animation='';
    b.style.background='';
    b.style.boxShadow='';
  },170);

  // Sound & haptic
  const pitch=0.78+Math.random()*0.64;
  playPop(pitch, type==='bomb'?0.72:type==='golden'?0.62:0.38);
  if(isUser) vib(type==='bomb'?[60,20,60]:type==='golden'?50:32);

  // Scoring
  const pts=type==='golden'?5:1;
  state.popped++;
  state.pts+=pts;

  // Streak
  const now=Date.now();
  if(now-state.lastPop<580){
    state.streak++;
    if(state.streak>state.maxStreak) state.maxStreak=state.streak;
  } else {
    state.streak=1;
  }
  state.lastPop=now;
  onStreak();

  // Speed
  state.popTimes.push(now);
  state.popTimes=state.popTimes.filter(t=>now-t<=1000);
  state.pps=state.popTimes.length;
  if(state.pps>state.maxPPS) state.maxPPS=state.pps;

  // Float label
  if(pts>1) spawnFloat(b,'+5','#ffd700',18);
  else if(state.streak>=5) spawnFloat(b,'×'+state.streak,'#ffc832',14);

  // Special effects
  if(type==='bomb'){
    triggerAch('bomb');
    bombChain(idx);
  }
  if(type==='golden') triggerAch('golden');
  if(type==='frozen'){
    triggerAch('freeze');
    freezeAura(idx);
  }

  updateHUD();
  checkAchs();

  // Completion check — use real count not pts
  if(state.popped>=state.total) onComplete();
}

function bombChain(center){
  const{cols}=calcGrid();
  const cr=Math.floor(center/cols), cc=center%cols;
  const R=3;

  // shockwave
  const bEl=state.bubbles[center];
  const bRect=bEl.getBoundingClientRect();
  const cRect=canvasEl.getBoundingClientRect();
  const sw=document.createElement('div');
  sw.className='shockwave';
  const swsz=bEl.offsetWidth*9;
  sw.style.cssText=`
    left:${bRect.left-cRect.left-swsz/2+bEl.offsetWidth/2}px;
    top:${bRect.top-cRect.top-swsz/2+bEl.offsetHeight/2}px;
    width:${swsz}px;height:${swsz}px;`;
  canvasEl.appendChild(sw);
  setTimeout(()=>sw.remove(),460);
  vib([50,20,50,20,80]);

  // chain — use distance-based delay, skip frozen
  for(let r=cr-R;r<=cr+R;r++){
    for(let c=cc-R;c<=cc+R;c++){
      const dist=Math.sqrt((r-cr)**2+(c-cc)**2);
      if(dist>R||dist===0) continue;
      const ni=r*cols+c;
      if(ni<0||ni>=state.total||!state.alive[ni]) continue;
      const delay=Math.round(dist*48);
      setTimeout(()=>popAt(ni,false),delay);
    }
  }
}

function freezeAura(center){
  const{cols}=calcGrid();
  const cr=Math.floor(center/cols),cc=center%cols;
  const R=4;
  const toFreeze=[];
  for(let r=cr-R;r<=cr+R;r++){
    for(let c=cc-R;c<=cc+R;c++){
      const ni=r*cols+c;
      if(ni>=0&&ni<state.total&&state.alive[ni]&&ni!==center){
        state.frozen.add(ni);
        toFreeze.push(ni);
        state.bubbles[ni].classList.add('frozen-locked');
      }
    }
  }
  showToast('🧊 周圍氣泡凍結 3 秒！');
  setTimeout(()=>{
    toFreeze.forEach(i=>{
      state.frozen.delete(i);
      if(state.bubbles[i]) state.bubbles[i].classList.remove('frozen-locked');
    });
  },3000);
}

// ══ STREAK / COMBO ══
function onStreak(){
  const badge=document.getElementById('streak-badge');
  document.getElementById('sval').textContent=state.streak;
  if(state.streak>=3) badge.classList.add('show');
  else badge.classList.remove('show');

  if(state.streak>0&&state.streak%5===0){
    const flash=document.getElementById('combo-flash');
    const label=state.streak>=20?`🌋 MEGA ×${state.streak}!`:state.streak>=10?`💥 SUPER ×${state.streak}!`:`🔥 ×${state.streak}`;
    flash.textContent=label;
    flash.classList.remove('show');
    void flash.offsetWidth; // reflow to restart animation
    flash.classList.add('show');
    clearTimeout(comboTimer);
    comboTimer=setTimeout(()=>flash.classList.remove('show'),750);
  }

  clearTimeout(streakResetTimer);
  streakResetTimer=setTimeout(()=>{
    state.streak=0;
    document.getElementById('streak-badge').classList.remove('show');
  },580);
}

// ══ FLOAT SCORE ══
function spawnFloat(el,txt,color,size){
  const rect=el.getBoundingClientRect();
  const cRect=canvasEl.getBoundingClientRect();
  const f=document.createElement('div');
  f.className='float-num';
  f.textContent=txt;
  f.style.cssText=`left:${rect.left-cRect.left}px;top:${rect.top-cRect.top}px;color:${color};font-size:${size}px;`;
  canvasEl.appendChild(f);
  setTimeout(()=>f.remove(),720);
}

// ══ HUD ══
function updateHUD(){
  document.getElementById('snum').textContent=state.pts;
  document.getElementById('lb-cur').textContent=state.pts;
  document.getElementById('lb-cmb').textContent=state.maxStreak;
  document.getElementById('lb-spd').textContent=state.maxPPS||'—';
  document.getElementById('speed-val').textContent=state.pps;

  const pct=state.total>0?state.popped/state.total:0;
  const circ=131.9;
  document.getElementById('pr-fill').style.strokeDashoffset=circ*(1-pct);
  document.getElementById('pr-label').textContent=Math.round(pct*100)+'%';
}

// ══ AUTO ══
document.getElementById('btn-auto').addEventListener('click',toggleAuto);
function toggleAuto(){
  if(autoRunning){stopAuto();return;}
  autoRunning=true;
  const btn=document.getElementById('btn-auto');
  btn.textContent='⏹ 停止';btn.classList.remove('accent');btn.classList.add('danger');

  // snapshot remaining indices
  const rem=[];
  for(let i=0;i<state.total;i++){if(state.alive[i]&&!state.frozen.has(i))rem.push(i);}
  let idx=0;
  const spd=SPEEDS[cfg.speed];
  function next(){
    if(!autoRunning||idx>=rem.length){stopAuto();return;}
    const i=rem[idx++];
    if(state.alive[i]) popAt(i,false);
    autoTimer=setTimeout(next,spd);
  }
  next();
}
function stopAuto(){
  autoRunning=false;clearTimeout(autoTimer);
  const btn=document.getElementById('btn-auto');
  btn.textContent='▶ 自動';btn.classList.add('accent');btn.classList.remove('danger');
}

// ══ COMPLETE / RESTORE ══
function onComplete(){
  stopAuto();
  state.rounds++;
  playChime();
  triggerAch('full');
  checkAchs();
  if(challengeOn){endChallenge(true);return;}
  clearTimeout(restoreTimer);
  restoreTimer=setTimeout(restoreAll,5000);
  showToast('✨ 全清！5 秒後充氣…');
}

function restoreAll(){
  // Reset state fully
  state.popped=0;state.pts=0;state.streak=0;state.maxStreak=0;
  state.pps=0;state.maxPPS=0;state.popTimes=[];state.lastPop=0;
  state.frozen.clear();
  // Rebuild specials
  buildGrid();
  // Animate refill with stagger
  state.bubbles.forEach((b,i)=>{
    b.style.opacity='0';
    setTimeout(()=>{
      b.style.animation='bbl-refill 0.38s cubic-bezier(.34,1.56,.64,1) forwards';
      setTimeout(()=>{b.style.animation='';b.style.opacity='1';},400);
    },i*5+50);
  });
  showToast('💨 充氣完成，再來一輪！');
  updateHUD();
}

// ══ CHALLENGE MODE ══
document.getElementById('btn-mode').addEventListener('click',()=>{
  if(challengeOn){endChallenge(false);return;}
  countdown(3,startChallenge);
});
function countdown(n,cb){
  const ov=document.getElementById('cdov');
  const num=document.getElementById('cd-num');
  ov.classList.add('show');
  num.textContent=n;
  playPop(1.2+n*0.1,0.45);
  if(n>0) setTimeout(()=>countdown(n-1,cb),700);
  else{
    num.textContent='GO!';
    playPop(1.8,0.55);
    setTimeout(()=>{ov.classList.remove('show');cb();},550);
  }
}
function startChallenge(){
  challengeOn=true;challengeStartPopped=state.popped;
  document.getElementById('btn-mode').textContent='⏹ 結束';
  document.getElementById('btn-mode').classList.add('danger');
  document.getElementById('mode-banner').style.display='block';
  document.getElementById('timer-bar-wrap').style.display='block';
  const fill=document.getElementById('timer-bar-fill');
  fill.style.transition='none';fill.style.width='100%';
  const start=Date.now();
  challengeTimer=setInterval(()=>{
    const el=(Date.now()-start)/1000;
    const left=CHALLENGE_SEC-el;
    fill.style.transition='width 0.12s linear';
    fill.style.width=Math.max(0,left/CHALLENGE_SEC*100)+'%';
    const scored=state.popped-challengeStartPopped;
    document.getElementById('mode-banner').textContent=`⏱ ${Math.ceil(Math.max(0,left))}s — 已戳 ${scored} 顆`;
    if(left<=0) endChallenge(true);
  },120);
}
function endChallenge(timesUp){
  clearInterval(challengeTimer);challengeOn=false;
  document.getElementById('btn-mode').textContent='⏱ 挑戰';
  document.getElementById('btn-mode').classList.remove('danger');
  document.getElementById('mode-banner').style.display='none';
  document.getElementById('timer-bar-wrap').style.display='none';
  document.getElementById('timer-bar-fill').style.width='100%';
  if(timesUp){
    const scored=state.popped-challengeStartPopped;
    showToast(`⏱ 挑戰結束！${CHALLENGE_SEC}秒戳了 ${scored} 顆`);
    vib([40,20,40,20,80]);
  }
}

// ══ THEME ══
document.getElementById('btn-theme').addEventListener('click',()=>{
  themeIdx=(themeIdx+1)%THEMES.length;
  // Re-apply bubble backgrounds
  state.bubbles.forEach((b,i)=>{
    if(state.alive[i]){
      const{bg,sh}=bubbleBG(i,state.type[i]);
      b.style.background=bg;
      b.style.boxShadow=sh;
    }
  });
  showToast('🎨 '+THEME_NAMES[themeIdx]);
});

// ══ SETTINGS ══
document.getElementById('btn-set').addEventListener('click',()=>document.getElementById('set-ov').classList.add('open'));
document.getElementById('set-close').addEventListener('click',()=>document.getElementById('set-ov').classList.remove('open'));
document.getElementById('set-ov').addEventListener('click',e=>{if(e.target===document.getElementById('set-ov'))document.getElementById('set-ov').classList.remove('open');});

[['s-sound','sound'],['s-vib','vib'],['s-bomb','bomb'],['s-golden','golden'],['s-frozen','frozen'],['s-drag','drag']]
.forEach(([id,key])=>{document.getElementById(id).addEventListener('change',e=>{cfg[key]=e.target.checked;});});

document.getElementById('seg-size').addEventListener('click',e=>{
  const b=e.target.closest('.seg-b');if(!b)return;
  document.querySelectorAll('#seg-size .seg-b').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');cfg.size=b.dataset.v;
  stopAuto();clearTimeout(restoreTimer);buildGrid();
});
document.getElementById('seg-spd').addEventListener('click',e=>{
  const b=e.target.closest('.seg-b');if(!b)return;
  document.querySelectorAll('#seg-spd .seg-b').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');cfg.speed=b.dataset.v;
});

// ══ LEADERBOARD ══
document.getElementById('btn-lb').addEventListener('click',()=>{renderLB();document.getElementById('lb-ov').classList.add('open');});
document.getElementById('lb-close').addEventListener('click',()=>document.getElementById('lb-ov').classList.remove('open'));
document.getElementById('lb-ov').addEventListener('click',e=>{if(e.target===document.getElementById('lb-ov'))document.getElementById('lb-ov').classList.remove('open');});
document.getElementById('lb-save-btn').addEventListener('click',saveLBEntry);
document.getElementById('lb-name-in').addEventListener('keydown',e=>{if(e.key==='Enter')saveLBEntry();});

function getLB(){try{return JSON.parse(localStorage.getItem(LSKEY))||[];}catch{return[];}}
function saveLBEntry(){
  const name=document.getElementById('lb-name-in').value.trim();
  if(!name){document.getElementById('lb-name-in').focus();return;}
  if(state.pts===0){showToast('還沒戳任何氣泡！');return;}
  const rows=getLB();
  rows.push({name,score:state.pts,combo:state.maxStreak,pps:state.maxPPS,date:new Date().toLocaleDateString('zh-TW')});
  rows.sort((a,b)=>b.score-a.score);
  localStorage.setItem(LSKEY,JSON.stringify(rows.slice(0,50)));
  document.getElementById('lb-name-in').value='';
  renderLB();
  showToast(`🏆 已儲存 ${state.pts} 分！`);
}
function renderLB(){
  updateHUD();
  const rows=getLB();
  const list=document.getElementById('lb-list');
  if(!rows.length){list.innerHTML='<div class="lb-empty">還沒有紀錄，快去戳泡泡！</div>';return;}
  list.innerHTML=rows.map((s,i)=>{
    const rc=i===0?'r-g':i===1?'r-s':i===2?'r-b':'r-o';
    const rs=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    return`<div class="lb-row">
      <div class="lb-rank ${rc}">${rs}</div>
      <div class="lb-name">${esc(s.name)}</div>
      <div class="lb-score">${s.score}</div>
      <div class="lb-extra">×${s.combo||0}<br>${s.date||''}</div>
    </div>`;
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══ ACHIEVEMENTS ══
function unlocked(){try{return new Set(JSON.parse(localStorage.getItem(ACHKEY))||[]);}catch{return new Set();}}
function checkAchs(){
  const done=unlocked();
  ACHS.forEach(a=>{if(!done.has(a.id)&&a.cond())triggerAch(a.id);});
}
function triggerAch(id){
  const a=ACHS.find(x=>x.id===id);if(!a)return;
  const done=unlocked();if(done.has(id))return;
  done.add(id);localStorage.setItem(ACHKEY,JSON.stringify([...done]));
  const wrap=document.getElementById('ach-wrap');
  document.getElementById('ach-icon').textContent=a.icon;
  document.getElementById('ach-text').textContent='成就：'+a.lbl;
  wrap.classList.remove('show');void wrap.offsetWidth;wrap.classList.add('show');
  setTimeout(()=>wrap.classList.remove('show'),2800);
  playPop(1.9,0.48);
}

// ══ TOAST ══
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000);
}

// ══ INIT ══
buildGrid();
window.addEventListener('resize',()=>{
  stopAuto();clearTimeout(restoreTimer);
  if(challengeOn)endChallenge(false);
  buildGrid();
});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
